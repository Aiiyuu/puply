name: Build & Infra

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Build Web
        run: |
          pnpm install
          pnpm --filter web build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build API
        run: cd apps/api && go build -o /dev/null ./cmd/server/main.go

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker Images
        run: make build
